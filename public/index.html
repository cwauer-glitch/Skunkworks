<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skunkworks — Account Org Chart</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-flextree@2"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3"></script>
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-head">
      <h1>Skunkworks</h1>
      <button id="sidebarToggle" title="Collapse to sellers only">&laquo;</button>
    </div>

    <div id="sidebarMain">
      <div class="control-row">
        <label for="orgSwitcher">Organization:</label>
        <select id="orgSwitcher"></select>
      </div>

      <div class="control-row">
        <label for="search">Find Client:</label>
        <input id="search" type="text" list="employee-list" placeholder="Name..." autocomplete="off" />
        <datalist id="employee-list"></datalist>
      </div>
      <div class="control-row">
        <label></label>
        <button id="clearBtn">Show Full Org</button>
      </div>

      <div class="control-row">
        <label>Show Client Org:</label>
        <button id="clearDrilldownBtn">Clear All</button>
      </div>
      <div id="clientOrgDrilldown" class="drilldown-container"></div>

      <div class="control-row">
        <label for="sortBy">Sort/Group:</label>
        <select id="sortBy">
          <option value="none">None</option>
          <option value="seller">Apex Seller</option>
          <option value="location">Geography</option>
          <option value="priority">Priority Signal</option>
        </select>
      </div>

      <div class="control-row" id="prioritySortOptions" style="display:none;">
        <label>Show signal:</label>
        <span class="slider-row">
          <label><input type="checkbox" id="priorityWatchChk" /> Watch</label>
          <label><input type="checkbox" id="priorityHighChk" /> High</label>
        </span>
      </div>

      <div class="control-row">
        <label for="depthSlider">Level below selected:</label>
        <span class="slider-row"><input type="range" id="depthSlider" min="0" max="5" value="2" /><span id="depthValue">2</span></span>
      </div>

      <div class="control-row">
        <label for="priorityFilter">Flagged priority only:</label>
        <input type="checkbox" id="priorityFilter" />
      </div>

      <div class="control-row">
        <label for="vpLabelsToggle">Show org labels:</label>
        <input type="checkbox" id="vpLabelsToggle" checked />
      </div>

      <div class="control-row">
        <label></label>
        <button id="addPersonBtn">+ Add Person</button>
      </div>
    </div>

    <div id="amFilterSection">
      <div class="am-filter-header">
        <h3>Apex Sellers</h3>
        <button id="allAmsBtn">All AMs</button>
      </div>
      <div id="amFilterList"></div>
    </div>

    <div id="sidebarBottom">
      <button id="versionHistoryBtn">Version History</button>
      <button id="newOrgBtn">+ New Org</button>
    </div>
  </aside>

  <main id="chart"></main>

  <div id="detailPanel" class="hidden">
    <button id="closeDetail">&times;</button>
    <div id="detailContent"></div>
  </div>

  <div id="passcodeModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Edit passcode required</h3>
      <p id="passcodeError" class="modal-error"></p>
      <input id="passcodeInput" type="password" placeholder="Enter edit passcode" />
      <div class="modal-actions">
        <button id="passcodeCancel">Cancel</button>
        <button id="passcodeSubmit">Continue</button>
      </div>
    </div>
  </div>

  <div id="addPersonModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Add Person</h3>
      <p id="addPersonError" class="modal-error"></p>
      <div class="field-row"><label>Name</label><input id="apName" type="text" /></div>
      <div class="field-row"><label>Title</label><input id="apTitle" type="text" /></div>
      <div class="field-row"><label>Level</label>
        <select id="apLevel">
          <option value="CTO">CTO</option>
          <option value="SVP">SVP</option>
          <option value="VP">VP</option>
          <option value="Director">Director</option>
          <option value="Manager">Manager</option>
          <option value="Staff" selected>Staff</option>
        </select>
      </div>
      <div class="field-row"><label>Division</label><input id="apDivision" type="text" /></div>
      <div class="field-row"><label>Location</label><input id="apLocation" type="text" /></div>
      <div class="field-row"><label>Apex Seller</label><input id="apSeller" type="text" /></div>
      <div class="field-row"><label>Seller Territory</label><input id="apSellerTerritory" type="text" /></div>
      <div class="field-row"><label>Reports To</label><select id="apManager"></select></div>
      <label>Priority Tags <input id="apPriorityTags" type="text" /></label>
      <label>Priority Goal <textarea id="apPriorityGoal"></textarea></label>
      <label>Priority Signal
        <select id="apPrioritySignal">
          <option value="none" selected>None</option>
          <option value="watch">Watch</option>
          <option value="high">High</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="addPersonCancel">Cancel</button>
        <button id="addPersonSubmit">Add</button>
      </div>
    </div>
  </div>

  <div id="newOrgModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>New Organization</h3>
      <p id="newOrgError" class="modal-error"></p>
      <input id="newOrgName" type="text" placeholder="Organization name" />
      <div class="modal-actions">
        <button id="newOrgCancel">Cancel</button>
        <button id="newOrgSubmit">Create</button>
      </div>
    </div>
  </div>

  <div id="versionHistoryModal" class="modal-overlay hidden">
    <div class="modal modal-wide">
      <h3>Version History</h3>
      <p id="versionError" class="modal-error"></p>
      <div class="version-history-body">
        <div id="versionList" class="version-list"></div>
        <div id="versionPreview" class="version-preview"></div>
      </div>
      <div class="modal-actions">
        <button id="versionHistoryClose">Close</button>
        <button id="restoreVersionBtn" class="danger hidden">Restore this version</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
